name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  export-android:
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: 4.2.2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Android dependencies
        uses: android-actions/setup-android@v3

      - name: Download Godot editor and export templates
        run: |
          set -euxo pipefail
          wget -q https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
          wget -q https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz
          unzip -q Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
          unzip -q Godot_v${GODOT_VERSION}-stable_export_templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          mv templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/
          chmod +x Godot_v${GODOT_VERSION}-stable_linux.x86_64

      - name: Configure debug keystore
        run: |
          set -euxo pipefail
          mkdir -p ~/.config/godot
          keytool -genkeypair -v -keystore ~/.config/godot/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          cat > ~/.config/godot/editor_settings-4.tres <<'SETTINGS'
          [gd_resource type="EditorSettings" format=3]
          [resource]
          export/android/debug_keystore = "~/.config/godot/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          SETTINGS

      - name: Export debug APK
        run: |
          set -euxo pipefail
          mkdir -p build
          ./Godot_v${GODOT_VERSION}-stable_linux.x86_64 --headless --path . --export-debug Android build/HearthlandsRoutebuilder-debug.apk
          test -f build/HearthlandsRoutebuilder-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/HearthlandsRoutebuilder-debug.apk
